name: Docker Setup
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag'
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3
    # ---------------- DOCKER BUILD ----------------
    - name: Build Docker Image
